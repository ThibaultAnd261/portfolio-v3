<svg width="450" height="550" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#F5F0EB"/>

  <!-- Title -->
  <text x="30" y="40" fill="#1A1614" font-family="sans-serif" font-size="16" font-weight="bold">My React Template</text>
  <!-- Nav tabs -->
  <text x="30" y="62" fill="#B8654D" font-family="sans-serif" font-size="9">Overview</text>
  <text x="85" y="62" fill="#B8654D" font-family="sans-serif" font-size="9">Headings</text>
  <text x="140" y="62" fill="#B8654D" font-family="sans-serif" font-size="9">Text</text>
  <text x="175" y="62" fill="#B8654D" font-family="sans-serif" font-size="9">Buttons</text>
  <text x="225" y="62" fill="#B8654D" font-family="sans-serif" font-size="9">Badges</text>

  <!-- Card 1: Heading Atom -->
  <rect x="20" y="80" width="200" height="160" rx="8" fill="#FFFFFF" stroke="#E0DCD7" stroke-width="1"/>
  <text x="35" y="105" fill="#1A1614" font-family="sans-serif" font-size="12" font-weight="bold">Heading Atom</text>
  <rect x="35" y="112" width="130" height="6" rx="2" fill="#1A1614" opacity="0.15"/>
  <rect x="35" y="130" width="100" height="14" rx="2" fill="#1A1614" opacity="0.7"/>
  <rect x="35" y="150" width="80" height="10" rx="2" fill="#1A1614" opacity="0.5"/>
  <rect x="35" y="166" width="90" height="8" rx="2" fill="#1A1614" opacity="0.35"/>
  <rect x="35" y="180" width="70" height="7" rx="2" fill="#1A1614" opacity="0.25"/>

  <!-- Card 2: Text Atom -->
  <rect x="230" y="80" width="200" height="160" rx="8" fill="#FFFFFF" stroke="#E0DCD7" stroke-width="1"/>
  <text x="245" y="105" fill="#1A1614" font-family="sans-serif" font-size="12" font-weight="bold">Text Atom</text>
  <rect x="245" y="112" width="120" height="6" rx="2" fill="#1A1614" opacity="0.15"/>
  <rect x="245" y="130" width="80" height="8" rx="2" fill="#1A1614" opacity="0.4"/>
  <rect x="245" y="145" width="70" height="8" rx="2" fill="#1A1614" opacity="0.25"/>
  <rect x="245" y="162" width="130" height="8" rx="2" fill="#4CAF50" opacity="0.4"/>
  <rect x="245" y="177" width="140" height="8" rx="2" fill="#F44336" opacity="0.4"/>
  <rect x="245" y="192" width="110" height="8" rx="2" fill="#D4A574" opacity="0.5"/>
  <rect x="245" y="207" width="100" height="8" rx="2" fill="#2196F3" opacity="0.4"/>

  <!-- Card 3: Button Atom -->
  <rect x="20" y="255" width="200" height="140" rx="8" fill="#FFFFFF" stroke="#E0DCD7" stroke-width="1"/>
  <text x="35" y="280" fill="#1A1614" font-family="sans-serif" font-size="12" font-weight="bold">Button Atom</text>
  <rect x="35" y="287" width="120" height="6" rx="2" fill="#1A1614" opacity="0.15"/>
  <!-- Buttons -->
  <rect x="35" y="305" width="55" height="22" rx="11" fill="#B8654D"/>
  <rect x="96" y="305" width="55" height="22" rx="11" fill="none" stroke="#B8654D" stroke-width="1.2"/>
  <rect x="157" y="305" width="50" height="22" rx="11" fill="#4CAF50"/>
  <rect x="35" y="335" width="50" height="22" rx="11" fill="#F44336"/>
  <rect x="91" y="335" width="45" height="22" rx="11" fill="#2196F3"/>
  <rect x="142" y="335" width="55" height="22" rx="11" fill="#999" opacity="0.35"/>

  <!-- Card 4: Badge Atom -->
  <rect x="230" y="255" width="200" height="140" rx="8" fill="#FFFFFF" stroke="#E0DCD7" stroke-width="1"/>
  <text x="245" y="280" fill="#1A1614" font-family="sans-serif" font-size="12" font-weight="bold">Badge Atom</text>
  <rect x="245" y="287" width="100" height="6" rx="2" fill="#1A1614" opacity="0.15"/>
  <!-- Soft badges -->
  <rect x="245" y="305" width="35" height="18" rx="9" fill="#2196F3" opacity="0.15"/>
  <rect x="285" y="305" width="48" height="18" rx="9" fill="#4CAF50" opacity="0.15"/>
  <rect x="338" y="305" width="48" height="18" rx="9" fill="#D4A574" opacity="0.2"/>
  <rect x="391" y="305" width="35" height="18" rx="9" fill="#F44336" opacity="0.15"/>
  <!-- Solid badges -->
  <rect x="245" y="332" width="42" height="18" rx="9" fill="#2196F3"/>
  <rect x="292" y="332" width="55" height="18" rx="9" fill="#4CAF50"/>
  <rect x="352" y="332" width="60" height="18" rx="9" fill="#D4A574"/>

  <!-- Card 5: Utilities -->
  <rect x="20" y="410" width="410" height="120" rx="8" fill="#FFFFFF" stroke="#E0DCD7" stroke-width="1"/>
  <text x="35" y="435" fill="#1A1614" font-family="sans-serif" font-size="12" font-weight="bold">Utilities</text>
  <rect x="35" y="442" width="150" height="6" rx="2" fill="#1A1614" opacity="0.15"/>
  <!-- Grid of utility boxes -->
  <rect x="35" y="460" width="60" height="30" rx="4" fill="#B8654D" opacity="0.1"/>
  <rect x="100" y="460" width="60" height="30" rx="4" fill="#D4A574" opacity="0.15"/>
  <rect x="165" y="460" width="60" height="30" rx="4" fill="#9A4B3F" opacity="0.1"/>
  <rect x="230" y="460" width="60" height="30" rx="4" fill="#1A1614" opacity="0.06"/>
  <rect x="295" y="460" width="60" height="30" rx="4" fill="#B8654D" opacity="0.08"/>
  <rect x="360" y="460" width="60" height="30" rx="4" fill="#D4A574" opacity="0.1"/>
  <rect x="35" y="496" width="60" height="22" rx="4" fill="#4CAF50" opacity="0.1"/>
  <rect x="100" y="496" width="60" height="22" rx="4" fill="#F44336" opacity="0.1"/>
  <rect x="165" y="496" width="60" height="22" rx="4" fill="#2196F3" opacity="0.1"/>
