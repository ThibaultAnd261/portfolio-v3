<svg width="450" height="550" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#1A1614"/>

  <!-- Navbar -->
  <rect x="0" y="0" width="450" height="40" fill="#222"/>
  <circle cx="30" cy="20" r="6" fill="#B8654D"/>
  <text x="42" y="24" fill="#EDE7DC" font-family="sans-serif" font-size="10" font-weight="bold">MusicWorld</text>
  <rect x="140" y="12" width="40" height="16" rx="8" fill="#333"/>
  <rect x="186" y="12" width="40" height="16" rx="8" fill="#333"/>
  <rect x="232" y="12" width="50" height="16" rx="8" fill="#333"/>

  <!-- Album cover -->
  <rect x="130" y="70" width="190" height="190" rx="14" fill="#9A4B3F" opacity="0.5"/>
  <rect x="145" y="85" width="160" height="160" rx="10" fill="#D4A574" opacity="0.3"/>
  <circle cx="225" cy="165" r="35" fill="none" stroke="#EDE7DC" stroke-width="1.5" opacity="0.25"/>
  <circle cx="225" cy="165" r="7" fill="#EDE7DC" opacity="0.3"/>

  <!-- Title placeholder -->
  <rect x="40" y="285" width="250" height="18" rx="4" fill="#EDE7DC" opacity="0.7"/>
  <rect x="40" y="312" width="150" height="10" rx="3" fill="#EDE7DC" opacity="0.25"/>

  <!-- Play button -->
  <rect x="40" y="340" width="90" height="32" rx="16" fill="#B8654D"/>
  <polygon points="63,350 63,362 78,356" fill="#EDE7DC"/>
  <text x="82" y="360" fill="#EDE7DC" font-family="sans-serif" font-size="10" font-weight="bold">Play</text>

  <!-- Tracklist -->
  <rect x="40" y="395" width="370" height="1" fill="#EDE7DC" opacity="0.08"/>
  <rect x="40" y="408" width="160" height="8" rx="2" fill="#EDE7DC" opacity="0.15"/>
  <rect x="340" y="408" width="40" height="8" rx="2" fill="#EDE7DC" opacity="0.1"/>
  <rect x="40" y="430" width="370" height="1" fill="#EDE7DC" opacity="0.08"/>
  <rect x="40" y="443" width="140" height="8" rx="2" fill="#EDE7DC" opacity="0.15"/>
  <rect x="340" y="443" width="40" height="8" rx="2" fill="#EDE7DC" opacity="0.1"/>
  <rect x="40" y="465" width="370" height="1" fill="#EDE7DC" opacity="0.08"/>
  <rect x="40" y="478" width="180" height="8" rx="2" fill="#EDE7DC" opacity="0.15"/>
  <rect x="340" y="478" width="40" height="8" rx="2" fill="#EDE7DC" opacity="0.1"/>

  <!-- Player bar -->
  <rect x="0" y="510" width="450" height="40" fill="#252220"/>
  <rect x="30" y="527" width="390" height="3" rx="2" fill="#333"/>
  <rect x="30" y="527" width="140" height="3" rx="2" fill="#B8654D"/>
  <circle cx="170" cy="528" r="5" fill="#B8654D"/>
</svg>
