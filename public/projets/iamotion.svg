<svg width="450" height="550" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#F5F0EB"/>

  <!-- Navbar -->
  <rect x="0" y="0" width="450" height="40" fill="#1A1614"/>
  <circle cx="30" cy="20" r="9" fill="none" stroke="#EDE7DC" stroke-width="1.5"/>
  <rect x="120" y="14" width="40" height="10" rx="3" fill="#EDE7DC" opacity="0.4"/>
  <rect x="175" y="14" width="55" height="10" rx="3" fill="#EDE7DC" opacity="0.4"/>
  <rect x="245" y="14" width="45" height="10" rx="3" fill="#EDE7DC" opacity="0.4"/>
  <rect x="305" y="14" width="35" height="10" rx="3" fill="#EDE7DC" opacity="0.4"/>

  <!-- Title -->
  <text x="225" y="78" text-anchor="middle" fill="#1A1614" font-family="sans-serif" font-size="16" font-weight="bold">Import de vidéos</text>

  <!-- Dropdown -->
  <rect x="40" y="95" width="370" height="30" rx="5" fill="#FFFFFF" stroke="#D4A574" stroke-width="1"/>
  <rect x="50" y="106" width="70" height="8" rx="2" fill="#1A1614" opacity="0.25"/>

  <!-- Button -->
  <rect x="100" y="140" width="250" height="30" rx="15" fill="#B8654D"/>
  <rect x="160" y="150" width="130" height="8" rx="2" fill="#EDE7DC" opacity="0.8"/>

  <!-- Video placeholder -->
  <rect x="80" y="190" width="180" height="110" rx="8" fill="#1A1614" opacity="0.08"/>
  <circle cx="170" cy="245" r="18" fill="#B8654D" opacity="0.5"/>
  <polygon points="164,237 164,253 180,245" fill="#EDE7DC"/>

  <!-- Separator -->
  <rect x="40" y="320" width="370" height="1" fill="#1A1614" opacity="0.08"/>

  <!-- Results section -->
  <rect x="130" y="338" width="60" height="22" rx="4" fill="#1A1614"/>
  <text x="140" y="353" fill="#EDE7DC" font-family="sans-serif" font-size="8">Barres</text>
  <rect x="196" y="338" width="60" height="22" rx="4" fill="none" stroke="#1A1614" stroke-width="0.8"/>
  <rect x="262" y="338" width="70" height="22" rx="4" fill="none" stroke="#1A1614" stroke-width="0.8"/>

  <!-- Pie chart -->
  <circle cx="225" cy="440" r="70" fill="#D4A574" opacity="0.2"/>
  <path d="M225,440 L225,370 A70,70 0 0,1 290,415 Z" fill="#D4A574" opacity="0.6"/>
  <path d="M225,440 L290,415 A70,70 0 0,1 270,500 Z" fill="#B8654D" opacity="0.6"/>
  <path d="M225,440 L270,500 A70,70 0 0,1 180,495 Z" fill="#9A4B3F" opacity="0.6"/>
  <path d="M225,440 L180,495 A70,70 0 0,1 160,400 Z" fill="#1A1614" opacity="0.2"/>
  <path d="M225,440 L160,400 A70,70 0 0,1 225,370 Z" fill="#B8654D" opacity="0.35"/>

  <!-- Legend -->
  <circle cx="110" cy="535" r="4" fill="#D4A574"/>
  <circle cx="170" cy="535" r="4" fill="#B8654D"/>
  <circle cx="230" cy="535" r="4" fill="#9A4B3F"/>
  <circle cx="290" cy="535" r="4" fill="#1A1614" opacity="0.3"/>
